<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calculadora Interactiva</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Calculadora</h1>
    <div class="Numeradores">
      <input type="number" id="valor1" placeholder="Número 1" required >
      <input type="number" id="valor2" placeholder="Número 2" required >
    </div>
    <div class="botones">
        <button onclick="sumar()">Sumar</button>
        <button onclick="restar()">Restar</button>
        <button onclick="multiplicar()">Multiplicar</button>
        <button onclick="dividir()">Dividir</button>
    </div>


    <h2 id="resultado"></h2>

  </div>

  <script src="script.js"></script>
</body>
</html>

</body>
</html>
